<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FixBee · Sign in with Google</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbb800;
        color: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .card {
        background: #fff9e6;
        border-radius: 24px;
        padding: 32px 28px;
        max-width: 320px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: #3a3a3a;
        margin: 0 0 24px;
      }
      #status {
        font-size: 13px;
        color: #6b7280;
        margin-top: 16px;
        min-height: 18px;
      }
      .g_id_signin {
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in to FixBee</h1>
      <p>Use your Google account to continue.</p>

      <div
        id="g_id_onload"
        data-client_id="811380357759-12in04mm0hv2f22443skeukaa8ss73kj.apps.googleusercontent.com"
        data-callback="handleCredential"
        data-auto_prompt="false"
      ></div>
      <div
        class="g_id_signin"
        data-type="standard"
        data-shape="pill"
        data-theme="filled_black"
        data-text="continue_with"
        data-size="large"
      ></div>

      <div id="status"></div>
    </div>

    <script>
      function handleCredential(response) {
        var idToken = response && response.credential;
        var statusEl = document.getElementById("status");
        if (!idToken) {
          statusEl.textContent = "No credential returned. Please try again.";
          return;
        }
        statusEl.textContent = "Signing you in…";

        var params = new URLSearchParams(window.location.search);
        var redirectUri = params.get("redirect_uri") || "fixbee://google-auth";
        var sep = redirectUri.indexOf("?") === -1 ? "?" : "&";
        window.location.href =
          redirectUri + sep + "id_token=" + encodeURIComponent(idToken);
      }
    </script>
  </body>
</html>
