$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/api/users/update'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "location": "Toronto, ON",
      "password": "newpassword123"
    }
